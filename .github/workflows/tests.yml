name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  run-unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 11
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Cache Maven dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run unit tests
        run: mvn -B test -DexcludedGroups=integration

      - name: Publish unit test report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        if: always()
        with:
          check_name: Publish unit tests report
          require_tests: true
          report_paths: '**/target/*-reports/TEST-*.xml'
          follow_symlink: true
          detailed_summary: true


  run-integration-tests:
    name: Run integration tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scylla-docker-version: ['latest', '6.2', '5.2']
      fail-fast: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 11
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Cache Maven dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run integration tests (${{ matrix.scylla-docker-version }})
        run: mvn -B verify -Dgroups=integration -DfailIfNoTests=false -Dscylla.docker.version=${{ matrix.scylla-docker-version }}

      - name: Publish integration test report (${{ matrix.scylla-docker-version }})
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        if: always()
        with:
          check_name: Publish integration tests report (${{ matrix.scylla-docker-version }})
          require_tests: true
          report_paths: '**/target/*-reports/TEST-*.xml'
          follow_symlink: true
          detailed_summary: true
